name: Sync-Upstream

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    name: Sync fork with upstream
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/3899/SimAdmin.git
          git fetch upstream

      - name: Merge upstream changes
        run: |
          git checkout main
          git merge upstream/main --no-edit -X theirs

      - name: Reapply fork-specific changes
        run: |
          sed -i 's|https://api.github.com/repos/3899/SimAdmin/releases/latest|https://api.github.com/repos/small2star/SimAdmin-AMD64/releases/latest|' backend/src/ota.rs
          git add backend/src/ota.rs
          git commit -m "chore: keep OTA update URL pointing to fork repository" || true

      - name: Push changes
        run: |
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
